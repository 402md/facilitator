        <rect x="0" y="0" width="92" height="40" rx="10" fill="#1d35cf" fill-opacity="0.08" stroke="#1d35cf" stroke-opacity="0.2"/>
        <text x="46" y="26" fill="#1d35cf" text-anchor="middle">UNI</text>
      </g>
      <g transform="translate(568, 0)">
        <rect x="0" y="0" width="110" height="40" rx="10" fill="#1d35cf" fill-opacity="0.08" stroke="#1d35cf" stroke-opacity="0.2"/>
        <text x="55" y="26" fill="#1d35cf" text-anchor="middle">WORLD</text>
