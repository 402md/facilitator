      <g transform="translate(0, 110)">
        <text x="0" y="0" fill="#1d35cf" transform="skewX(-10)">your chain out.</text>
      </g>
    </g>

    <g transform="translate(80, 452)" font-weight="500" font-size="26" fill="#5a5147">
