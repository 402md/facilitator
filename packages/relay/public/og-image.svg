<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="accentStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d35cf"/>
      <stop offset="0.6" stop-color="#1d35cf"/>
      <stop offset="1" stop-color="#4a63e0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#1d35cf" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#f8f3e8"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="8" fill="url(#accentStripe)"/>

  <g font-family="Bricolage Grotesque, sans-serif">
    <g transform="translate(80, 96)">
      <text x="0" y="0" font-size="26" font-weight="500" fill="#1d35cf" letter-spacing="1">
        402md · facilitator
      </text>
    </g>

    <g transform="translate(80, 220)" font-weight="700" font-size="100" letter-spacing="-3">
